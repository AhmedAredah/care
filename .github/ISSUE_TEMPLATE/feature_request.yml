name: Feature request
description: Suggest a new feature or improvement.
title: "[Feature] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing a feature. Before opening, please note
        that CARE has four hard invariants — anything that conflicts
        with **offline-first**, **fail-closed**, **plugin-only**, or
        **no original PDFs in public exports** is out of scope.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case, not the feature. We may suggest a different solution.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like CARE to behave?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - OCR / providers
        - PII detection / redaction
        - Document AI / VLM
        - Templates
        - Pipeline / workers
        - GUI / frontend
        - CLI
        - Packaging / deployment
        - Documentation
        - Other
    validations:
      required: true

  - type: checkboxes
    id: invariants
    attributes:
      label: Invariants
      options:
        - label: This proposal preserves offline-first, fail-closed, plugin-only behaviour and the safe-export rules.
          required: true
