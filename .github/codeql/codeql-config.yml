# CodeQL advanced configuration for CARE.
#
# Loaded by .github/workflows/codeql.yml.
#
# Decisions encoded here:
#   1. Use the security-extended query suite. Default catches a
#      narrow band; security-extended adds higher-recall taint
#      queries (path injection, command injection, SSRF, prototype
#      pollution) which are exactly the classes we care about for an
#      offline document-processing tool.
#   2. Exclude tests, build artefacts, and tooling caches. Tests
#      intentionally exercise unsafe inputs to verify rejection;
#      build/ is PyInstaller / Inno Setup / WiX scaffolding.
#
# Sanitizer modeling note:
#   CodeQL Python's `py/path-injection` query uses a QL class
#   (`PathSanitizer`) for sanitizers, not a Models-as-Data
#   extensible predicate. Until that changes upstream, the existing
#   path-injection alerts on this repo are dismissed via the
#   code-scanning API with a "won't fix — sanitized by safe_join /
#   normalize_input_path" rationale (see ./README.md). New code that
#   adds a path-injection alert should either route the input
#   through one of those sanitizers or include a justification when
#   dismissing.
name: "CARE CodeQL config"

# security-extended is one tier above the default suite. It includes
# all default queries plus higher-recall security queries. We do NOT
# enable security-and-quality because the quality queries are noisy
# for this size of repo and would crowd out real security findings.
queries:
  - uses: security-extended

# Path-based filters. CodeQL scans these by default; we narrow scope
# so the dashboard reflects production code only.
paths:
  - care
  - frontend
  - scripts

paths-ignore:
  # Test code intentionally constructs unsafe inputs to verify
  # rejection. CodeQL's path/command-injection queries flag the
  # inputs themselves, which is not actionable.
  - tests
  # PyInstaller / Inno Setup / WiX / PowerShell scaffolding. Not
  # Python or JS code CodeQL can usefully analyze, and the Python
  # autobuild crashes if any regular file lives at the top of
  # `build/` (see workflow comment). The workflow renames `build/`
  # aside for the Python run; this entry covers JS and any future
  # languages.
  - build
  # Local virtualenvs and tooling caches that may end up checked
  # out on self-hosted runners.
  - "**/.venv"
  - "**/__pycache__"
  - "**/node_modules"
