# CodeQL Models-as-Data: internal sanitizers for CARE.
#
# What this file does:
#   Registers our two path-traversal guards as model summaries so
#   CodeQL's Python taint-tracking knows that data flowing through
#   them is bounds-checked. This addresses the bulk of the
#   py/path-injection alerts on the dashboard, which are flagged
#   only because CodeQL's stock model doesn't recognise our
#   sanitizers.
#
# How to extend:
#   * Add another row under the same `data:` block. Columns are
#     positional — see the codeql/python-all reference for the full
#     schema.
#   * Run CodeQL locally if iterating:
#         codeql database analyze \
#           --format=sarif-latest \
#           --output=results.sarif \
#           ./codeql-db ./.github/codeql/codeql-config.yml
#
# References:
#   https://docs.github.com/en/code-security/codeql-cli/using-the-codeql-cli/customizing-analysis-with-codeql-packs
#   https://github.com/github/codeql/blob/main/python/ql/lib/semmle/python/dataflow/new/internal/ExternalFlowExtensions.qll

extensions:
  # ------------------------------------------------------------------
  # safe_join(base, *parts) — care.core.security
  #
  # Resolves `base` and `*parts`, then asserts the resolved candidate
  # is contained inside `base` via Path.relative_to(...). Raises
  # PathTraversalError on escape. Treat the return value as
  # untainted with respect to py/path-injection.
  # ------------------------------------------------------------------
  - addsTo:
      pack: codeql/python-all
      extensible: summaryModel
    data:
      # package, type, subtypes, name, signature, input, output, kind, provenance
      - ["care.core.security", "", False, "safe_join", "", "Argument[0..]", "ReturnValue", "value", "manual"]

  # ------------------------------------------------------------------
  # assert_inside(base, candidate) — care.core.security
  #
  # Raises if candidate is not contained inside base. Returns None,
  # but registering it here documents the intent and gives us a hook
  # if CodeQL ever grows a "check" model kind.
  # ------------------------------------------------------------------
  - addsTo:
      pack: codeql/python-all
      extensible: summaryModel
    data:
      - ["care.core.security", "", False, "assert_inside", "", "Argument[0..]", "ReturnValue", "value", "manual"]

  # ------------------------------------------------------------------
  # normalize_input_path(path_str) — care.core.paths
  #
  # Trims whitespace + paired quotes, asserts is_absolute_cross_platform,
  # raises ValueError on relative input, and translates Windows-style
  # drive paths to /mnt/<drive>/... on Linux. Treat the return value
  # as untainted with respect to py/path-injection.
  # ------------------------------------------------------------------
  - addsTo:
      pack: codeql/python-all
      extensible: summaryModel
    data:
      - ["care.core.paths", "", False, "normalize_input_path", "", "Argument[0]", "ReturnValue", "value", "manual"]
