name: Policy checks

on:
  pull_request:
  push:
    branches:
      - main

# Minimal default permissions. Job needs only to checkout source,
# install dependencies, and run pytest / governance_check.py — none
# of which require write access to the repo, issues, or any other
# scope. Each job MAY upgrade this with its own ``permissions:``
# block if it ever needs to comment on PRs or upload artifacts.
permissions:
  contents: read

jobs:
  policy:
    runs-on: ubuntu-latest

    env:
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      HF_DATASETS_OFFLINE: "1"
      HF_HUB_DISABLE_TELEMETRY: "1"
      HF_HUB_DISABLE_IMPLICIT_TOKEN: "1"
      CARE_OFFLINE: "1"
      UV_LINK_MODE: "copy"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install uv
          uv sync

      - name: Run policy check
        run: uv run python scripts/governance_check.py

      - name: Run policy tests
        run: |
          if [ -d tests/governance ]; then
            uv run python -m pytest tests/governance
          fi

      - name: Run offline tests
        run: |
          if [ -d tests/offline ]; then
            uv run python -m pytest tests/offline
          fi
