# Windows release-build workflow (Phase 15.9).
#
# Triggers:
#   - On tag push (v*) — full release path: build all four .exe SKUs
#     and both .msi flavours, sign every artifact through SignPath
#     Foundation, and attach them to a GitHub Release.
#   - workflow_dispatch — manual trigger for dry-runs (no signing,
#     no release upload).
#
# This workflow is intentionally separate from governance.yml so a
# routine PR doesn't pay the cost of a 2 GB ml-flavour build. PR-time
# Windows checks live in windows-tests.yml.
#
# Signing — SignPath Foundation:
#   The project must be enrolled at https://signpath.io/foundation
#   (free for OSS). Once approved, three secrets are required:
#     SIGNPATH_API_TOKEN          — CI submission token (repo secret)
#     SIGNPATH_ORGANIZATION_ID    — repo variable
#     SIGNPATH_PROJECT_SLUG       — repo variable
#     SIGNPATH_SIGNING_POLICY     — repo variable (e.g., release-signing)
#   No private key is ever stored in GitHub Actions; SignPath holds
#   custody.
name: Windows build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      sign:
        description: "Submit artifacts to SignPath for signing"
        type: boolean
        default: false
      release:
        description: "Attach artifacts to a GitHub Release"
        type: boolean
        default: false

permissions:
  contents: write   # needed to create the GitHub Release on tag push
  id-token: write   # SignPath uses OIDC for authentication

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        flavour: [core, ml]
      fail-fast: false

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: |
          pip install uv

      - name: Install runtime deps
        run: |
          if ('${{ matrix.flavour }}' -eq 'ml') {
            uv sync --extra ml
          } else {
            uv sync
          }

      - name: Install PyInstaller
        run: |
          uv pip install pyinstaller

      - name: Run PyInstaller
        env:
          OCE_FLAVOUR: ${{ matrix.flavour }}
        run: |
          pwsh -File build/build_windows.ps1 -Flavour ${{ matrix.flavour }}

      - name: Fetch WebView2 redistributables
        run: |
          pwsh -File build/fetch_webview2.ps1

      - name: Install Inno Setup
        run: |
          choco install innosetup --no-progress --yes

      - name: Build Inno Setup installers
        run: |
          pwsh -File build/build_windows.ps1 -Flavour ${{ matrix.flavour }} -Installers -SkipPyInstaller

      - name: Install WiX 6
        run: |
          # build/care.wxs targets the WiX Toolset 6 schema; v7 has
          # breaking syntax changes. Pin to the 6.* series. Without
          # the pin, `dotnet tool install --global wix` resolves to
          # v7.0.0 and then a follow-up v6 install fails because the
          # tool is already present.
          dotnet tool install --global wix --version "6.*"
          # Make wix.exe visible to later steps in this job.
          echo "$env:USERPROFILE\.dotnet\tools" >> $env:GITHUB_PATH
          # Prepend it to *this* step's PATH too so the wix extension
          # add commands below can resolve wix.exe immediately.
          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"
          # WiX 6 modularised the UI, Util, etc. features into separate
          # extension packages; care.wxs uses WixToolset.UI.wixext.
          # `wix extension add -g` registers them globally so subsequent
          # `wix build -ext WixToolset.UI.wixext` calls can resolve them.
          wix extension add -g WixToolset.UI.wixext/6.0.2

      - name: Build WiX MSI
        run: |
          pwsh -File build/build_windows.ps1 -Flavour ${{ matrix.flavour }} -Msi -SkipPyInstaller

      - name: Upload unsigned artifacts
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-${{ matrix.flavour }}
          path: |
            dist/installers/*.exe
            dist/installers/*.msi
          if-no-files-found: error
          retention-days: 7

  sign:
    needs: build
    runs-on: windows-latest
    # Sign only when SignPath enrolment is configured (the org-id
    # variable is populated) AND we're either on a tag push or
    # someone explicitly opted in via workflow_dispatch. Without
    # enrolment the SignPath action would error on every tag push
    # and block the release job (which 'needs: sign'); until
    # enrolment completes the release job falls back to the
    # unsigned artifacts from the build job.
    if: |
      vars.SIGNPATH_ORGANIZATION_ID != '' && (
        startsWith(github.ref, 'refs/tags/v') ||
        (github.event_name == 'workflow_dispatch' && inputs.sign)
      )
    strategy:
      matrix:
        flavour: [core, ml]
      fail-fast: false

    steps:
      - name: Download unsigned artifacts
        uses: actions/download-artifact@v4
        with:
          name: unsigned-${{ matrix.flavour }}
          path: unsigned

      - name: Submit to SignPath
        # SignPath Foundation provides this action. It uploads the
        # artifact zip, kicks off a signing run under our policy, and
        # waits for the signed artifact back.
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: "${{ secrets.SIGNPATH_API_TOKEN }}"
          organization-id: "${{ vars.SIGNPATH_ORGANIZATION_ID }}"
          project-slug: "${{ vars.SIGNPATH_PROJECT_SLUG }}"
          signing-policy-slug: "${{ vars.SIGNPATH_SIGNING_POLICY }}"
          github-artifact-id: "${{ steps.upload-unsigned.outputs.artifact-id }}"
          wait-for-completion: true
          output-artifact-directory: signed
          artifact-configuration-slug: "care-${{ matrix.flavour }}"

      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: signed-${{ matrix.flavour }}
          path: signed/*
          if-no-files-found: error

  release:
    # Don't 'needs: sign' — that job is conditional on SignPath
    # enrolment, and a skipped job is treated as success-with-noop
    # but its artifacts won't exist. We always need 'build', and we
    # try the signed artifacts first, then fall back to unsigned.
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v6

      - name: Download signed core artifacts (if signing enabled)
        if: vars.SIGNPATH_ORGANIZATION_ID != ''
        uses: actions/download-artifact@v4
        with:
          name: signed-core
          path: release-assets

      - name: Download signed ml artifacts (if signing enabled)
        if: vars.SIGNPATH_ORGANIZATION_ID != ''
        uses: actions/download-artifact@v4
        with:
          name: signed-ml
          path: release-assets

      - name: Download unsigned core artifacts (fallback)
        if: vars.SIGNPATH_ORGANIZATION_ID == ''
        uses: actions/download-artifact@v4
        with:
          name: unsigned-core
          path: release-assets

      - name: Download unsigned ml artifacts (fallback)
        if: vars.SIGNPATH_ORGANIZATION_ID == ''
        uses: actions/download-artifact@v4
        with:
          name: unsigned-ml
          path: release-assets

      - name: Generate release notes
        env:
          SIGNED: ${{ vars.SIGNPATH_ORGANIZATION_ID != '' }}
          TAG: ${{ github.ref_name }}
        run: |
          # Hand-curated notes file at .github/release-notes/<tag>.md is
          # the preferred body. Fall back to a minimal auto-generated
          # header if no file is committed for this tag.
          HAND_NOTES=".github/release-notes/${TAG}.md"
          if [ -f "$HAND_NOTES" ]; then
            cp "$HAND_NOTES" NOTES.md
          else
            echo "## care ${TAG}" > NOTES.md
            echo "" >> NOTES.md
            echo "_(no curated release notes were committed for this tag — see commit history.)_" >> NOTES.md
          fi
          echo "" >> NOTES.md
          echo "---" >> NOTES.md
          echo "" >> NOTES.md
          if [ "$SIGNED" = "true" ]; then
            echo "**Signing.** Binaries are signed by [SignPath Foundation](https://signpath.io/foundation), the OSS code-signing program." >> NOTES.md
          else
            echo "**Signing.** These binaries are **unsigned** — SignPath Foundation enrolment is in progress. SmartScreen will warn on first launch; verify the SHA-256 below before clicking **More info → Run anyway** (or right-click → Properties → tick **Unblock** → OK)." >> NOTES.md
          fi
          echo "" >> NOTES.md
          echo "### SHA-256 verification" >> NOTES.md
          echo "" >> NOTES.md
          echo "\`\`\`" >> NOTES.md
          (cd release-assets && sha256sum *) >> NOTES.md
          echo "\`\`\`" >> NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          body_path: NOTES.md
          draft: true
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
