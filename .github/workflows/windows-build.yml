# Windows release-build workflow (Phase 15.9).
#
# Triggers:
#   - On tag push (v*) — full release path: build all four .exe SKUs
#     and both .msi flavours, sign every artifact through SignPath
#     Foundation, and attach them to a GitHub Release.
#   - workflow_dispatch — manual trigger for dry-runs (no signing,
#     no release upload).
#
# This workflow is intentionally separate from governance.yml so a
# routine PR doesn't pay the cost of a 2 GB ml-flavour build. PR-time
# Windows checks live in windows-tests.yml.
#
# Signing — SignPath Foundation:
#   The project must be enrolled at https://signpath.io/foundation
#   (free for OSS). Once approved, three secrets are required:
#     SIGNPATH_API_TOKEN          — CI submission token (repo secret)
#     SIGNPATH_ORGANIZATION_ID    — repo variable
#     SIGNPATH_PROJECT_SLUG       — repo variable
#     SIGNPATH_SIGNING_POLICY     — repo variable (e.g., release-signing)
#   No private key is ever stored in GitHub Actions; SignPath holds
#   custody.
name: Windows build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      sign:
        description: "Submit artifacts to SignPath for signing"
        type: boolean
        default: false
      release:
        description: "Attach artifacts to a GitHub Release"
        type: boolean
        default: false

permissions:
  contents: write   # needed to create the GitHub Release on tag push
  id-token: write   # SignPath uses OIDC for authentication

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        flavour: [core, ml]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: |
          pip install uv

      - name: Install runtime deps
        run: |
          if ('${{ matrix.flavour }}' -eq 'ml') {
            uv sync --extra ml
          } else {
            uv sync
          }

      - name: Install PyInstaller
        run: |
          uv pip install pyinstaller

      - name: Run PyInstaller
        env:
          OCE_FLAVOUR: ${{ matrix.flavour }}
        run: |
          pwsh -File build/build_windows.ps1 -Flavour ${{ matrix.flavour }}

      - name: Fetch WebView2 redistributables
        run: |
          pwsh -File build/fetch_webview2.ps1

      - name: Install Inno Setup
        run: |
          choco install innosetup --no-progress --yes

      - name: Build Inno Setup installers
        run: |
          pwsh -File build/build_windows.ps1 -Flavour ${{ matrix.flavour }} -Installers -SkipPyInstaller

      - name: Install WiX 6
        run: |
          # build/care.wxs targets the WiX Toolset 6 schema; v7 has
          # breaking syntax changes. Pin to the 6.* series. Without
          # the pin, `dotnet tool install --global wix` resolves to
          # v7.0.0 and then a follow-up v6 install fails because the
          # tool is already present.
          dotnet tool install --global wix --version "6.*"
          # Make wix.exe visible to later steps in this job.
          echo "$env:USERPROFILE\.dotnet\tools" >> $env:GITHUB_PATH
          # Prepend it to *this* step's PATH too so the wix extension
          # add commands below can resolve wix.exe immediately.
          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"
          # WiX 6 modularised the UI, Util, etc. features into separate
          # extension packages; care.wxs uses WixToolset.UI.wixext.
          # `wix extension add -g` registers them globally so subsequent
          # `wix build -ext WixToolset.UI.wixext` calls can resolve them.
          wix extension add -g WixToolset.UI.wixext/6.0.2

      - name: Build WiX MSI
        run: |
          pwsh -File build/build_windows.ps1 -Flavour ${{ matrix.flavour }} -Msi -SkipPyInstaller

      - name: Upload unsigned artifacts
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-${{ matrix.flavour }}
          path: |
            dist/installers/*.exe
            dist/installers/*.msi
          if-no-files-found: error
          retention-days: 7

  sign:
    needs: build
    runs-on: windows-latest
    # Only sign on tag push or when manually opted in. PR-time builds
    # produce unsigned artifacts that are useful for smoke testing
    # without burning the SignPath quota.
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.sign)
    strategy:
      matrix:
        flavour: [core, ml]
      fail-fast: false

    steps:
      - name: Download unsigned artifacts
        uses: actions/download-artifact@v4
        with:
          name: unsigned-${{ matrix.flavour }}
          path: unsigned

      - name: Submit to SignPath
        # SignPath Foundation provides this action. It uploads the
        # artifact zip, kicks off a signing run under our policy, and
        # waits for the signed artifact back.
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: "${{ secrets.SIGNPATH_API_TOKEN }}"
          organization-id: "${{ vars.SIGNPATH_ORGANIZATION_ID }}"
          project-slug: "${{ vars.SIGNPATH_PROJECT_SLUG }}"
          signing-policy-slug: "${{ vars.SIGNPATH_SIGNING_POLICY }}"
          github-artifact-id: "${{ steps.upload-unsigned.outputs.artifact-id }}"
          wait-for-completion: true
          output-artifact-directory: signed
          artifact-configuration-slug: "care-${{ matrix.flavour }}"

      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: signed-${{ matrix.flavour }}
          path: signed/*
          if-no-files-found: error

  release:
    needs: sign
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Download signed core artifacts
        uses: actions/download-artifact@v4
        with:
          name: signed-core
          path: release-assets

      - name: Download signed ml artifacts
        uses: actions/download-artifact@v4
        with:
          name: signed-ml
          path: release-assets

      - name: Generate release notes
        run: |
          echo "## care ${{ github.ref_name }}" > NOTES.md
          echo "" >> NOTES.md
          echo "Signed by [SignPath Foundation](https://signpath.io/foundation)." >> NOTES.md
          echo "" >> NOTES.md
          echo "### Variants" >> NOTES.md
          echo "" >> NOTES.md
          echo "| File | Flavour | WebView2 | Notes |" >> NOTES.md
          echo "|---|---|---|---|" >> NOTES.md
          echo "| CARE-*-core-online-Setup.exe | Core | Online (~2 MB bootstrapper) | Default desktop installer |" >> NOTES.md
          echo "| CARE-*-core-airgap-Setup.exe | Core | Airgap (~150 MB) | For offline/air-gapped workstations |" >> NOTES.md
          echo "| CARE-*-ml-online-Setup.exe   | ML   | Online | Bundles torch + transformers (~2 GB) |" >> NOTES.md
          echo "| CARE-*-ml-airgap-Setup.exe   | ML   | Airgap | ml + offline WebView2 |" >> NOTES.md
          echo "| CARE-*-core.msi              | Core | Prerequisite | SCCM/Intune; admins pre-stage WebView2 |" >> NOTES.md
          echo "| CARE-*-ml.msi                | ML   | Prerequisite | SCCM/Intune (ML) |" >> NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          body_path: NOTES.md
          draft: true
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
