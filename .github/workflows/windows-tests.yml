# PR-time Windows test workflow (Phase 15.9).
#
# Runs the full pytest suite on Windows in addition to the Linux
# policy checks. We keep this separate from windows-build.yml
# because we don't want every PR to spend the wall-clock for a 2 GB
# ml-flavour PyInstaller bundle. PR builds verify that:
#   - the Python code runs on Windows,
#   - frozen-aware path / ACL helpers work on the real OS,
#   - the PyInstaller spec parses + the build/runner.py imports.
#
# A full installer build only runs on tag push (windows-build.yml).
name: Windows tests

on:
  pull_request:
  push:
    branches:
      - main

# Minimal default permissions — pytest doesn't need write access to
# the repo, issues, or PRs.
permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest

    env:
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      HF_DATASETS_OFFLINE: "1"
      HF_HUB_DISABLE_TELEMETRY: "1"
      HF_HUB_DISABLE_IMPLICIT_TOKEN: "1"
      CARE_OFFLINE: "1"
      UV_LINK_MODE: "copy"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install runtime deps (core only — ml takes too long for PR)
        run: uv sync

      - name: Run policy check
        run: uv run python scripts/governance_check.py

      - name: Run unit tests
        run: |
          if (Test-Path tests/unit) {
            uv run python -m pytest tests/unit -x -q
          }

      - name: Run policy tests
        run: |
          if (Test-Path tests/governance) {
            uv run python -m pytest tests/governance -x -q
          }

      - name: Run offline tests
        run: |
          if (Test-Path tests/offline) {
            uv run python -m pytest tests/offline -x -q
          }

      - name: Run API tests
        run: |
          # Tests under tests/api/ exercise FastAPI routes, the
          # pywebview desktop wrapper, and the desktop-shortcut
          # installers. Scoping these to Windows-too is what would
          # have caught the test_shortcut.py portability bugs at
          # PR time instead of a year later. Cheap to run.
          if (Test-Path tests/api) {
            uv run python -m pytest tests/api -x -q
          }

      - name: Run integration tests
        run: |
          # Integration tests build small synthetic PDFs / images
          # via fpdf2 + Pillow and run the full pipeline end-to-end
          # with the mock providers. No real model files needed; no
          # network. Slower than unit but still seconds, not minutes.
          if (Test-Path tests/integration) {
            uv run python -m pytest tests/integration -x -q
          }

      - name: Smoke-test PyInstaller spec parsing
        run: |
          uv run python -c "import ast; ast.parse(open('build/care.spec', encoding='utf-8').read())"
          uv run python -c "import ast; ast.parse(open('build/runner.py', encoding='utf-8').read())"
